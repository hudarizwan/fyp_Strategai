name: CI

on:
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONUNBUFFERED: '1'
      LOG_LEVEL: INFO
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: test-key
      SUPABASE_SERVICE_KEY: test-service-key
      SUPABASE_DB_URL: postgresql://postgres:test@localhost:5432/postgres
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: llama3.1:8b
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests -q

      - name: Run backend syntax check
        run: python -m compileall app

      - name: Verify backend Docker build
        run: docker build -t strategai-backend-test .

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/salik-frontend
    env:
      VITE_API_BASE_URL: http://localhost:8001
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/salik-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend TypeScript checks
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Verify Docker build
        run: docker build -t strategai-frontend-test .
