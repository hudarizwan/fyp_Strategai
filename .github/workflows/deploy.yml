name: Deploy

on:
  push:
    branches:
      - main

jobs:
  validate-and-deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/salik-frontend/package-lock.json

      - name: Validate deployment variables
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL repository variable is required for deployment validation." >&2
            exit 1
          fi

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONUNBUFFERED: '1'
          LOG_LEVEL: INFO
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: test-key
          SUPABASE_SERVICE_KEY: test-service-key
          SUPABASE_DB_URL: postgresql://postgres:test@localhost:5432/postgres
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          OLLAMA_MODEL: llama3.1:8b
          CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
        run: python -m pytest tests -q

      - name: Install frontend dependencies
        working-directory: frontend/salik-frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend/salik-frontend
        run: npm run lint

      - name: Run frontend TypeScript checks
        working-directory: frontend/salik-frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend/salik-frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t strategai-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t strategai-frontend ./frontend/salik-frontend

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Deploy frontend to Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: frontend/salik-frontend
